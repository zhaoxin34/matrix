<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flowing Glowing Strings</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
          "simplex-noise": "https://cdn.jsdelivr.net/npm/simplex-noise@4.0.1/dist/esm/simplex-noise.js"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
      import { createNoise2D } from "simplex-noise";

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.z = 20;

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // ====== Controls ======
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      // ====== Post Processing Bloom ======
      const composer = new EffectComposer(renderer);
      const renderPass = new RenderPass(scene, camera);
      composer.addPass(renderPass);

      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.5,
        0.4,
        0.85,
      );
      composer.addPass(bloomPass);

      // ====== Parameters ======
      const numStrings = 8;
      const pointsPerString = 150;
      const strings = [];

      // ====== Shader Material ======
      const vertexShader = `
uniform float time;
uniform float offset;
varying float vY;

void main(){
    vec3 pos = position;
    float t = time;
    float n = sin(pos.x*2.0 + t*2.0 + offset*5.0) * 0.8;
    float n2 = sin(pos.x*3.0 - t*1.5 + offset*3.0) * 0.4;
    pos.y += n + n2;
    pos.z += n2*0.5;
    vY = pos.y;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos,1.0);
}
`;

      const fragmentShader = `
varying float vY;
void main(){
    float hue = mod(vY*0.1 + 0.5, 1.0);
    vec3 color = 0.5 + 0.5*cos(6.2831*(hue + vec3(0.0,0.33,0.66)));
    gl_FragColor = vec4(color,1.0);
}
`;

      // ====== Create Strings ======
      for (let s = 0; s < numStrings; s++) {
        const points = [];
        for (let i = 0; i < pointsPerString; i++) {
          points.push(new THREE.Vector3((i / pointsPerString) * 12 - 6, 0, 0));
        }
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.ShaderMaterial({
          vertexShader: vertexShader,
          fragmentShader: fragmentShader,
          uniforms: {
            time: { value: 0 },
            offset: { value: s * 0.5 },
          },
          transparent: true,
        });
        const line = new THREE.Line(geometry, material);
        scene.add(line);
        strings.push(line);
      }

      // ====== Animate ======
      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        strings.forEach((line) => {
          line.material.uniforms.time.value = t;
        });

        camera.position.x = Math.sin(t * 0.15) * 25;
        camera.position.y = Math.sin(t * 0.1) * 10;
        camera.lookAt(0, 0, 0);

        controls.update();
        composer.render();
      }

      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
