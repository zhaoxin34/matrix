<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neo Agent - Configuration</title>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <div class="header-icon">N</div>
      <div class="header-info">
        <h1>Neo Agent</h1>
        <span class="header-version">v0.1.0 - 配置</span>
      </div>
    </div>

    <!-- URLs Configuration -->
    <div class="section">
      <div class="section-title">连接地址</div>

      <div class="form-group">
        <label class="form-label" for="frontend-url">前端地址</label>
        <input
          type="url"
          id="frontend-url"
          class="form-input"
          placeholder="http://localhost:3300"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="backend-url">后端地址</label>
        <input
          type="url"
          id="backend-url"
          class="form-input"
          placeholder="http://localhost:8000"
        />
      </div>

      <div class="save-indicator" id="save-indicator"></div>
    </div>

    <!-- Feature Toggles -->
    <div class="section">
      <div class="section-title">功能</div>

      <div class="toggle-row">
        <div>
          <div class="toggle-label">启用遮罩</div>
          <div class="toggle-label-hint">
            显示录制指示器和控件
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="enable-overlay" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <div>
          <div class="toggle-label">启用录制</div>
          <div class="toggle-label-hint">
            将用户交互记录为事件
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="enable-recording" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Info Box -->
    <div class="info-box">
      <p>
        <strong>注意：</strong>模式选择、录制控件和状态显示在 iframe 面板中管理。使用页面底部的控件来打开/关闭智能体界面。
      </p>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="#" class="footer-link" id="reload-iframe">⟳ 重新加载 iframe</a>
      <a href="#" class="footer-link" id="open-options">⚙ 设置</a>
    </div>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
