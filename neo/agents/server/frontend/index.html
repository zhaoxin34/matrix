<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent UI Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: white;
      border-bottom: 1px solid #e5e5e5;
      padding: 1rem;
    }
    header h1 {
      font-size: 1.25rem;
      color: #333;
    }
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>🤖 Agent UI Demo</h1>
  </header>
  <main>
    <div id="app"></div>
  </main>
  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import { AgentChat } from './src/index.ts';

    const root = createRoot(document.getElementById('app'));
    root.render(React.createElement(AgentChat, { 
      endpoint: 'ws://localhost:8080' 
    }));
  </script>
</body>
</html>
