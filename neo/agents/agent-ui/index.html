<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" sizes="512x512" type="image/x-icon" />
    <title>Pi Agent Web</title>
    <meta
      name="description"
      content="Pi Coding Agent Web Interface"
    />
    <!--
      Run the dark-mode bootstrap synchronously so React doesn't paint
      the light theme first and then flash. Mirrors what app/layout.tsx
      did in the old Next.js version.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("pi-theme");
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body style="height: 100dvh; display: flex; flex-direction: column">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
